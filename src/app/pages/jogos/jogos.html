<div class="container mt-5">
  <div class="row">
    @for (obj of lista; track obj.id) {
      <div class="col-lg-3 col-md-4 col-sm-6 mb-5">
        
        <div class="product-card">

          <div class="img-wrapper">
            <!-- Usando a primeira foto do array ou fallback se estiver vazio -->
            <img [src]="obj.fotos[0] || 'assets/jogos/sem-foto.jpg'" class="img-fluid">
          </div>

          <div class="product-info">
            <h5 class="product-title">Jogo {{obj.nome}}</h5>
            
            <div class="price-and-button-row">
              <div class="price-container">
                <span class="price-main">R$ {{obj.preco | number:'1.2-2'}}</span>
                
                <div class="player-info">
                  <img src="assets/icons/meeple.svg" class="meeple-icon">
                  <span class="player-count">{{obj.min_jogadores}} - {{obj.max_jogadores}} Jogadores</span>
                </div>
              </div>

              <div class="wrapper-btn-buy">
                <button class="btn-buy" [routerLink]="['/jogo-detalhe', obj.id]">
                  <span class="btn-text">Comprar</span>
                  <span class="btn-icon">+</span>
                </button>
              </div>
            </div>
          </div>

        </div>
      </div>
    }
  </div>
</div>
