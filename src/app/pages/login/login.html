<div class="login-page"> <!-- Container para centralizar na tela -->
  <div class="login-container">
    <h2>Login</h2>

    <!-- Grupo de Email -->
    <div class="form-group">
      <label>Email</label>
      <input type="email" [(ngModel)]="email" placeholder="Digite seu email">
    </div>

    <!-- Grupo de Senha -->
    <div class="form-group">
      <label>Senha</label>
      <input type="password" [(ngModel)]="senha" placeholder="Digite sua senha">
    </div>

    <button (click)="fazerLogin()">Entrar</button>

    <!-- Mensagem de erro estilizada -->
    @if (mensagem) {
      <p class="erro">{{mensagem}}</p>
    }

    <p class="signup-link">Não tem conta? <span routerLink="/cadastro">Cadastre-se</span></p>
  </div>
</div>
