<div class="container-cadastro">
  <div class="cadastro-box">

    <h2>Cadastro de Cliente</h2>

    <div class="form-group">
      <label>Nome</label>
      <input type="text" [(ngModel)]="obj.nome">
    </div>

    <div class="form-group">
      <label>Email</label>
      <input type="text" [(ngModel)]="obj.email">
    </div>

    <div class="form-group">
      <label>Documento</label>
      <input type="text" [(ngModel)]="obj.documento">
    </div>

    <div class="form-group">
      <label>Senha</label>
      <input type="password" [(ngModel)]="obj.senha">
    </div>

    <div class="form-group">
      <label>Endereço</label>
      <textarea [(ngModel)]="obj.logradouro"></textarea>
    </div>

    <button (click)="cadastrar()">Atualizar</button>

  </div>
</div>
